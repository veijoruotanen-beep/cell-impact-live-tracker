
name: Update Cell Impact Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy py7zr

      - name: Run tracker agent
        run: |
          python cell_impact_agent.py --output data/tracker.json

      - name: Copy to root
        run: |
          cp data/tracker.json tracker.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker.json tracker.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tracker data"
          git push
