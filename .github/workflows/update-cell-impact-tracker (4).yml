name: Update Cell Impact Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  update-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install py7zr

      - name: Run tracker agent
        run: |
          python cell_impact_agent.py --output data/tracker.json

      - name: Copy tracker to repo root
        run: |
          cp data/tracker.json tracker.json

      - name: Commit and push updated tracker files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker.json tracker.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Cell Impact tracker data"
          git push
