name: Update Cell Impact tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Run agent
        run: python cell_impact_agent.py

      - name: Verify JSON exists
        run: |
          test -f data/tracker.json
          echo "JSON file exists."

      - name: Commit and push JSON update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracker.json
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update tracker data"
          git push
