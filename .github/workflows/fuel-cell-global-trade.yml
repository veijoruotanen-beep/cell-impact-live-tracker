name: Update Fuel Cell Global Trade Data

on:
  schedule:
    - cron: "20 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run global trade agent
        env:
          UN_COMTRADE_API_KEY: ${{ secrets.UN_COMTRADE_API_KEY }}
        run: |
          python fuel_cell_global_trade_agent.py \
            --start-year 2019 \
            --output data/customs-monitor.json

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/customs-monitor.json
          git commit -m "Update fuel cell global trade data" || echo "No changes to commit"
          git push
